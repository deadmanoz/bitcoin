name: "Reproduce: GCC ASan SEGV in sha256_sse4::Transform"

# Demonstrates that GCC + AddressSanitizer causes a SEGV in the SSE4
# SHA256 implementation. The SSE4 code path is forced by patching out
# SHA-NI runtime detection, so the bug reproduces regardless of whether
# the runner CPU has SHA-NI support.
#
# Expected results:
#   before-fix (master): SEGV / test failure
#   after-fix (branch):  clean pass

on:
  workflow_dispatch:
    inputs:
      fix_branch:
        description: "Branch containing the fix"
        required: true
        default: "fix/gcc-asan-sha256-sse4-segv"

jobs:
  before-fix:
    name: "Before fix (master) — expect SEGV"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Environment info
        run: |
          echo "=== Compiler ==="
          gcc --version | head -1
          echo ""
          echo "=== CPU ==="
          lscpu | grep -iE 'model name|Thread|Core|Socket'
          echo ""
          echo "=== SHA-NI support ==="
          if grep -q sha_ni /proc/cpuinfo; then
            echo "SHA-NI: PRESENT (will be patched out to force SSE4 path)"
          else
            echo "SHA-NI: ABSENT (SSE4 path used naturally)"
          fi
          echo ""
          echo "=== SSE4 support ==="
          grep -oE 'sse4_[12]' /proc/cpuinfo | sort -u || echo "No SSE4"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build pkg-config \
            libevent-dev libboost-dev

      - name: Force SSE4 path (disable SHA-NI runtime detection)
        run: |
          echo "Patching sha256.cpp to skip SHA-NI, forcing SSE4 code path..."
          sed -i 's/have_x86_shani = (ebx >> 29) & 1;/have_x86_shani = false; \/\/ PATCHED: force SSE4/' \
            src/crypto/sha256.cpp
          grep -n "PATCHED" src/crypto/sha256.cpp

      - name: Build with GCC + ASan
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DSANITIZERS=address \
            -DBUILD_BENCH=OFF \
            -DBUILD_GUI=OFF \
            -DENABLE_WALLET=OFF \
            -DBUILD_CLI=OFF \
            -DBUILD_TX=OFF \
            -DBUILD_UTIL=OFF
          cmake --build build --target test_bitcoin -j$(nproc)

      - name: Run crypto tests (expect SEGV)
        id: test_before
        continue-on-error: true
        run: |
          echo "Running crypto_tests — expecting AddressSanitizer SEGV..."
          ./build/src/test/test_bitcoin --run_test=crypto_tests 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Verify failure
        run: |
          if [ "${{ steps.test_before.outcome }}" = "failure" ]; then
            echo "EXPECTED: crypto_tests failed (GCC ASan SEGV in sha256_sse4::Transform)"
          else
            echo "UNEXPECTED: crypto_tests passed — runner CPU may not exercise the buggy path"
            echo "This can happen if SSE4 is not available at all (unlikely on x86_64)"
          fi

  after-fix:
    name: "After fix (${{ inputs.fix_branch }}) — expect pass"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.fix_branch }}

      - name: Environment info
        run: |
          echo "=== Compiler ==="
          gcc --version | head -1
          echo ""
          echo "=== CPU ==="
          lscpu | grep -iE 'model name|Thread|Core|Socket'
          echo ""
          echo "=== SHA-NI support ==="
          if grep -q sha_ni /proc/cpuinfo; then
            echo "SHA-NI: PRESENT (will be patched out to force SSE4 path)"
          else
            echo "SHA-NI: ABSENT (SSE4 path used naturally)"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build pkg-config \
            libevent-dev libboost-dev

      - name: Force SSE4 path (disable SHA-NI runtime detection)
        run: |
          echo "Patching sha256.cpp to skip SHA-NI, forcing SSE4 code path..."
          sed -i 's/have_x86_shani = (ebx >> 29) & 1;/have_x86_shani = false; \/\/ PATCHED: force SSE4/' \
            src/crypto/sha256.cpp
          grep -n "PATCHED" src/crypto/sha256.cpp

      - name: Show the fix
        run: |
          echo "=== Guard in sha256_sse4.cpp ==="
          head -35 src/crypto/sha256_sse4.cpp | tail -25

      - name: Build with GCC + ASan
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DSANITIZERS=address \
            -DBUILD_BENCH=OFF \
            -DBUILD_GUI=OFF \
            -DENABLE_WALLET=OFF \
            -DBUILD_CLI=OFF \
            -DBUILD_TX=OFF \
            -DBUILD_UTIL=OFF
          cmake --build build --target test_bitcoin -j$(nproc)

      - name: Run crypto tests (should pass)
        run: |
          echo "Running crypto_tests — expecting clean pass with fix..."
          ./build/src/test/test_bitcoin --run_test=crypto_tests
          echo "crypto_tests passed with GCC + ASan + SSE4 path"
